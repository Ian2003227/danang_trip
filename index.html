<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>峴港 5 天 4 夜奢華自由行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fdfbf7; /* Light Luxury Cream */
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, .serif-font {
            font-family: 'Noto Serif TC', serif;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Premium Animations */
        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-fadeUp { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Light Glassmorphism */
        .glass-light {
            background: rgba(253, 251, 247, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* Premium Gold Elements */
        .text-gold {
            background: linear-gradient(to right, #b8860b, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #d4af37 100%);
        }
        
        /* Map Iframe Container */
        .map-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 0.75rem;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="antialiased selection:bg-amber-200/50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const HOTEL_NAME = "Khách sạn Mường Thanh Luxury Sông Hàn";
        
        const itineraryData = [
            {
                day: 1,
                date: "6/14 (日)",
                shortTitle: "抵達 & 龍橋",
                summary: "抵達峴港 ➡️ 必比登牛肉粉 ➡️ 【限定】龍橋噴火 ➡️ 芒青自家賭場",
                events: [
                    { time: "下午", type: "hotel", title: "抵達與入住五星基地", desc: "下飛機出關後開通 eSIM，直接搭乘 Grab 前往下榻的市中心飯店辦理入住。", location: HOTEL_NAME },
                    { time: "18:00", type: "food", title: "米其林順化牛肉粉 (HOOK推薦)", desc: "搭車 4 分鐘前往。享用湯頭帶有濃郁香茅精華與牛骨香氣的順化牛肉米粉。", location: "Bún Bò Bà Rơi" },
                    { time: "20:30", type: "sight", title: "【週末限定】龍橋噴火秀", desc: "晚上 9:00 準時開演。建議 8:45 前至橋頭卡位，近距離體驗巨龍噴火與噴水的震撼。", location: "Cầu Rồng Đà Nẵng", guideTips: [
                        { type: "cafe", title: "Cộng Cà Phê 共咖啡 (龍橋店)", desc: "🔥 火爆全網的越共懷舊主題咖啡廳！看秀前或看完秀後，如果覺得熱，可以來這裡吹冷氣，點一杯招牌「椰奶咖啡冰沙」休息一下。", location: "Cộng Cà Phê - Nguyễn Văn Linh" }
                    ]},
                    { time: "21:30", type: "casino", title: "第一家賭場巡禮", desc: "看完秀後直接回飯店，前往 2 樓娛樂城小試身手（攜帶實體護照與 50 美金現鈔開卡）。", location: "Club One Opera" }
                ]
            },
            {
                day: 2,
                date: "6/15 (一)",
                shortTitle: "半島 & 喜來登",
                summary: "越式煎餅 ➡️ 全套洗頭 ➡️ 山茶半島 ➡️ Huong Tram按摩 ➡️ 喜來登賭場",
                events: [
                    { time: "12:00", type: "food", title: "跳跳蝦越式煎餅 (HOOK推薦)", desc: "體驗外皮酥脆、搭配濃郁花生醬的道地越式煎餅。", location: "Ẩm Thực Năm Hiền - Bánh Xèo Tôm Nhảy" },
                    { time: "13:00", type: "relax", title: "全套越式洗頭舒壓", desc: "市區名店體驗 90 分鐘全套越式洗頭，享受洗臉、掏耳、按摩，巧妙避開正午烈日。", location: "Gội đầu dưỡng sinh Đà Nẵng" },
                    { time: "15:30", type: "sight", title: "山茶半島觀音像", desc: "搭車上山參拜巨大觀音像，俯瞰峴港絕美海岸線。", location: "Chùa Linh Ứng", guideTips: [
                        { type: "cafe", title: "Sơn Trà Marina (聖托里尼風)", desc: "如果拜拜完覺得熱，推薦去山腳下的這個碼頭咖啡廳。有著濃濃的地中海風情，喝杯飲料看夕陽超級愜意！", location: "Sơn Trà Marina" }

                    { time: "20:30", type: "casino", title: "第二家賭場巡禮", desc: "前往隔壁福朋喜來登酒店 2 樓博弈娛樂。結束後可上 36 樓飽覽高空夜景。", location: "Club SEVEN DRAGON Danang" }
                ]
            },
            {

                summary: "廣南麵 ➡️ 精油按摩 ➡️ 會安古鎮漫遊",
                events: [
                    { time: "12:00", type: "food", title: "家鄉味廣南麵 ＆ 米紙豬肉捲", desc: "品嚐經典廣南麵與肥波、HOOK 讚不絕口的米紙豬肉捲。", location: "Mỳ Quảng Quê Xưa" },
                    { time: "13:30", type: "relax", title: "二次精油舒壓按摩", desc: "在海灘區找家喜歡的 Spa 享受全身按摩，按完出發會安。", location: "Herbal Spa Danang" },
                    { time: "15:30", type: "sight", title: "會安古鎮漫遊", desc: "抵達會安！整個下午到晚上都可在此悠閒漫步，這裡非常多好逛的小店與咖啡廳，累了就隨時找地方坐坐。", location: "Phố cổ Hội An", guideTips: [
                        { type: "cafe", title: "Faifo Coffee 天台景觀", desc: "會安最知名的咖啡廳！逛累了可以去二樓吹冷氣，傍晚一定要上三樓露台拍攝會安古鎮標誌性的黃色屋頂全景。", location: "Faifo Coffee Hội An" },
                        { type: "drink", title: "Mót 特色蓮花茶", desc: "路上口渴必買！超有特色的草本飲品，杯上會放一片花瓣，網美打卡必備。", location: "Mót Hội An" },
                        { type: "shopping", title: "老街必買推薦", desc: "手工藤編包、真皮皮件、精美的傳統燈籠。如果時間充裕，還可以找裁縫店訂製一套絕美的越式奧黛！" },
                        { type: "sight", title: "秋盆河放水燈", desc: "黃昏魔幻時刻，建議搭乘傳統小木船放水燈祈福，從河面上欣賞整座古鎮亮起燈籠的絕美夜景。", location: "Bến tràng An Hội An" }
                    ]},
                    { time: "19:30", type: "food", title: "正宗高級會安小吃", desc: "逛完古鎮後，前往核心名店，品嚐最精緻衛生的白玫瑰、高樓麵與越式烤肉春捲。", location: "Morning Glory Original Hoi An" },
                    { time: "21:30", type: "hotel", title: "返回峴港飯店", desc: "滿載而歸返回峴港 (叫 Grab 汽車吹冷氣回飯店)。", location: HOTEL_NAME }
                ]
            },
            {
                day: 4,
                date: "6/17 (三)",
                shortTitle: "市集 & 米其林",
                summary: "漢市場血拼 ➡️ 米其林大餐 ➡️ 金灣賭場",
                events: [
                    { time: "10:00", type: "shopping", title: "漢市場血拼與市區巡禮", desc: "早上前往漢市場採買伴手禮，周邊也有許多值得走走的景點與休息站。", location: "Chợ Hàn", guideTips: [
                        { type: "shopping", title: "漢市場掃貨攻略", desc: "必買：帶皮腰果、夏威夷豆、芒果乾、綠豆糕、G7或Mr. Viet咖啡、越南花襯衫。⚠️ 記得從 5-7 折開始勇敢殺價！" },
                        { type: "cafe", title: "Maison Marou 頂級巧克力", desc: "血拼完一定滿頭大汗，推薦步行到這間「巧克力界愛馬仕」吹冷氣休息，試吃單一產區精品巧克力，喝杯冰可可！", location: "Maison Marou Flagship Da Nang" },
                        { type: "sight", title: "粉紅大教堂", desc: "就在漢市場旁邊走路可到，順路過去拍個網美照打卡！", location: "Nhà thờ chính tòa Đà Nẵng" }
                    ]},
                    { time: "12:15", type: "food", title: "【已預約】米其林包捲大餐", desc: "過河直奔 Bếp Cuốn，享用極具儀式感的傳統越式炸春捲與豬肉包捲。", location: "Bếp Cuốn Đà Nẵng" },
                    { time: "13:45", type: "relax", title: "SEN Boutique Spa (KOL激推)", desc: "【預約 13:45】直奔高質感名店享受 2 小時頂級 Spa 躲避熱浪。", location: "SEN Boutique Spa" },
                    { time: "16:00", type: "sight", title: "美溪海灘漫步", desc: "到隔壁的美溪海灘悠閒散步、踏浪吹海風。", location: "Bãi biển Mỹ Khê" },
                    { time: "18:00", type: "casino", title: "第三家賭場巡禮", desc: "前往金灣飯店拍攝中庭純金奇景，隨後進入 Lucky 7 Club 最終戰！", location: "Lucky 7 Club Danang" },
                    { time: "22:30", type: "food", title: "24小時現撈海鮮慶功宴", desc: "現點現撈奶油老虎蝦和蒜蓉龍蝦，為旅程劃下奢華句點。", location: "Hải sản Bé Ni 2" }
                ]
            },
            {
                day: 5,
                date: "6/18 (四)",
                shortTitle: "滿載而歸",
                summary: "漢江晨景 ➡️ 滿載機場",
                events: [
                    { time: "早上", type: "hotel", title: "飯店早餐 & 退房", desc: "在芒青飯店享用完早餐後，確認戰利品都已裝箱，辦理退房手續。", location: HOTEL_NAME },
                    { time: "出發前", type: "sight", title: "搭機返台", desc: "搭乘 Grab 汽車（約 5-8 分鐘）直奔機場搭機返台。", location: "Sân bay Quốc tế Đà Nẵng" }
                ]
            }
        ];

        // 1. Toast Notification Component (Light Mode)
        const Toast = ({ message, visible }) => (
            <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-500 ease-out ${visible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-8 scale-95 pointer-events-none'}`}>
                <div className="bg-white shadow-[0_10px_40px_rgba(0,0,0,0.12)] px-6 py-3.5 rounded-full flex items-center space-x-3 text-sm font-bold text-slate-800 border border-slate-100">
                    <i className="fa-solid fa-circle-check text-emerald-500 text-lg"></i>
                    <span>{message}</span>
                </div>
            </div>
        );

        // 2. Icon Helper (Light Luxury Colors)
        const getIcon = (type) => {
            const baseClass = "w-11 h-11 rounded-full flex items-center justify-center text-lg shadow-sm border bg-white z-10 shrink-0 relative";
            const glowClass = "absolute inset-0 rounded-full blur-md opacity-20 z-[-1]";
            
            switch(type) {
                case 'hotel': return <div className={`${baseClass} text-amber-600 border-amber-200`}><div className={`${glowClass} bg-amber-400`}></div><i className="fa-solid fa-bed"></i></div>;
                case 'food': return <div className={`${baseClass} text-orange-500 border-orange-200`}><div className={`${glowClass} bg-orange-400`}></div><i className="fa-solid fa-utensils"></i></div>;
                case 'sight': return <div className={`${baseClass} text-sky-500 border-sky-200`}><div className={`${glowClass} bg-sky-400`}></div><i className="fa-solid fa-camera-retro"></i></div>;
                case 'casino': return <div className={`${baseClass} bg-gradient-to-br from-yellow-100 to-amber-200 text-amber-800 border-amber-300`}><div className={`${glowClass} bg-yellow-400`}></div><i className="fa-solid fa-coins"></i></div>;
                case 'relax': return <div className={`${baseClass} text-rose-500 border-rose-200`}><div className={`${glowClass} bg-rose-400`}></div><i className="fa-solid fa-spa"></i></div>;
                case 'cafe': return <div className={`${baseClass} text-emerald-500 border-emerald-200`}><div className={`${glowClass} bg-emerald-400`}></div><i className="fa-solid fa-mug-hot"></i></div>;
                case 'shopping': return <div className={`${baseClass} text-fuchsia-500 border-fuchsia-200`}><div className={`${glowClass} bg-fuchsia-400`}></div><i className="fa-solid fa-bag-shopping"></i></div>;
                default: return <div className={`${baseClass} text-slate-500 border-slate-200`}><i className="fa-solid fa-map-pin"></i></div>;
            }
        };

        const EventCard = ({ event, onCopy, index }) => {
            const [showMap, setShowMap] = useState(false);
            
            const mapEmbedUrl = `https://maps.google.com/maps?q=${encodeURIComponent(event.location)}&t=m&z=15&ie=UTF8&iwloc=&output=embed`;
            const mapDirUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(HOTEL_NAME)}&destination=${encodeURIComponent(event.location)}`;

            return (
                <div className="relative mb-8 flex" style={{ animationDelay: `${index * 0.15}s` }}>
                    {/* Timeline Line */}
                    <div className="absolute left-[21px] top-10 bottom-[-40px] w-[2px] bg-gradient-to-b from-amber-200 to-transparent z-0"></div>
                    
                    {/* Icon */}
                    <div className="mr-4 relative z-10">
                        {getIcon(event.type)}
                    </div>

                    {/* Card Content (Light Mode) */}
                    <div className="flex-1 bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-amber-900/5 p-5 animate-fadeUp opacity-0 relative overflow-hidden backdrop-blur-md">
                        
                        {/* Time Tag */}
                        <div className="inline-block px-3 py-1 bg-amber-50 text-amber-700 rounded-full text-xs font-bold mb-3 tracking-wide border border-amber-200/60">
                            <i className="fa-regular fa-clock mr-1.5 opacity-80"></i>{event.time}
                        </div>

                        <h3 className="serif-font font-bold text-slate-800 text-xl leading-snug mb-2">{event.title}</h3>
                        <p className="text-slate-600 text-sm mb-4 leading-relaxed font-medium">{event.desc}</p>
                        
                        {/* Guidebook / Tips Section (Light Mode) */}
                        {event.guideTips && event.guideTips.length > 0 && (
                            <div className="mt-2 mb-5 bg-indigo-50/50 rounded-xl p-4 border border-indigo-100 relative overflow-hidden animate-fadeUp">
                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-400"></div>
                                <div className="text-indigo-800 text-[13px] font-black mb-3 flex items-center tracking-wider">
                                    <i className="fa-solid fa-lightbulb text-amber-500 mr-2 text-lg animate-pulse"></i> 
                                    周邊探索 ＆ 逛街攻略
                                </div>
                                <div className="space-y-3">
                                    {event.guideTips.map((tip, i) => {
                                        let iconClass = "fa-solid fa-star text-amber-500";
                                        if (tip.type === 'cafe') iconClass = "fa-solid fa-mug-hot text-emerald-500";
                                        if (tip.type === 'shopping') iconClass = "fa-solid fa-bag-shopping text-fuchsia-500";
                                        if (tip.type === 'drink') iconClass = "fa-solid fa-martini-glass-citrus text-sky-500";
                                        if (tip.type === 'sight') iconClass = "fa-solid fa-camera-retro text-rose-500";
                                        
                                        return (
                                            <div key={i} className="flex items-start bg-white p-3 rounded-lg border border-indigo-50/80 shadow-sm">
                                                <div className="mt-0.5 mr-3 w-5 text-center shrink-0">
                                                    <i className={iconClass}></i>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-slate-800 text-sm font-bold">{tip.title}</div>
                                                    <div className="text-slate-500 text-xs mt-1.5 leading-relaxed">{tip.desc}</div>
                                                    {tip.location && (
                                                        <button 
                                                            onClick={() => onCopy(tip.location)} 
                                                            className="mt-2.5 text-[11px] bg-slate-50 text-slate-600 px-3 py-1.5 rounded-md flex items-center hover:bg-slate-100 transition-colors border border-slate-200 active:scale-95 font-medium"
                                                        >
                                                            <i className="fa-solid fa-copy mr-1.5 opacity-80 text-amber-500"></i> 複製此地點
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Destination Box (Light Mode) */}
                        <div className="bg-slate-50 rounded-xl p-4 border border-slate-100">
                            <div className="text-[11px] text-slate-400 font-bold mb-1 uppercase tracking-wider flex items-center">
                                <i className="fa-solid fa-location-dot mr-1 text-rose-500"></i> Location
                            </div>
                            <div className="text-sm font-bold text-slate-700 break-words mb-4">
                                {event.location}
                            </div>
                            
                            {/* Action Buttons */}
                            <div className="flex flex-col space-y-3">
                                <button 
                                    onClick={() => onCopy(event.location)}
                                    className="w-full bg-[#00B14F] hover:bg-[#009140] text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center transition-all shadow-[0_4px_15px_rgba(0,177,79,0.2)] hover:shadow-[0_6px_20px_rgba(0,177,79,0.3)] active:scale-[0.98]"
                                >
                                    <i className="fa-solid fa-car-side mr-2 text-lg"></i>
                                    <span>一鍵複製給 Grab</span>
                                </button>
                                
                                <div className="flex space-x-3">
                                    <button 
                                        onClick={() => setShowMap(!showMap)}
                                        className="flex-1 bg-white border border-slate-200 text-slate-600 font-bold py-2.5 px-2 rounded-xl flex items-center justify-center text-sm transition-colors hover:bg-slate-50 active:scale-[0.98] shadow-sm"
                                    >
                                        <i className={`fa-solid ${showMap ? 'fa-eye-slash text-slate-400' : 'fa-map-location-dot text-amber-500'} mr-1.5`}></i> 
                                        {showMap ? '隱藏地圖' : '預覽地圖'}
                                    </button>
                                    <a 
                                        href={mapDirUrl} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="flex-1 bg-gradient-to-r from-amber-400 to-amber-500 text-white font-bold py-2.5 px-2 rounded-xl flex items-center justify-center text-sm transition-colors shadow-md active:scale-[0.98]"
                                    >
                                        <i className="fa-solid fa-location-arrow mr-1.5 opacity-90"></i> 飯店出發
                                    </a>
                                </div>
                            </div>

                            {/* Map Iframe */}
                            {showMap && (
                                <div className="map-container animate-fadeUp mt-4">
                                    <iframe src={mapEmbedUrl} allowFullScreen="" loading="lazy"></iframe>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [toastConfig, setToastConfig] = useState({ visible: false, message: "" });
            const [showChecklist, setShowChecklist] = useState(false);

            const handleCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    document.execCommand('copy');
                    showToast(`已複製！請至 Grab 貼上`);
                } catch (err) {
                    showToast(`複製失敗，請手動選取`);
                }
                document.body.removeChild(textArea);
            };

            const showToast = (message) => {
                setToastConfig({ visible: true, message });
                setTimeout(() => setToastConfig({ visible: false, message: "" }), 3000);
            };

            const activeData = itineraryData.find(d => d.day === activeDay);

            return (
                <div className="pb-28 max-w-md mx-auto min-h-screen relative shadow-2xl overflow-hidden bg-[#fdfbf7]">
                    <Toast message={toastConfig.message} visible={toastConfig.visible} />
                    
                    {/* Hero Header (Light Luxury Theme) */}
                    <div className="relative bg-white text-slate-800 rounded-b-[2rem] px-6 pt-14 pb-10 shadow-[0_10px_30px_rgba(0,0,0,0.03)] overflow-hidden border-b border-amber-100">
                        {/* Background Image with Light Overlay */}
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?q=80&w=1000&auto=format&fit=crop" className="w-full h-full object-cover opacity-[0.25]" alt="Da Nang" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf7] via-white/80 to-white/40"></div>
                        </div>
                        
                        <div className="relative z-10 flex flex-col items-center text-center">
                            <div className="bg-amber-100 text-amber-800 border border-amber-200 text-[10px] font-black tracking-widest uppercase px-4 py-1.5 rounded-full mb-4 shadow-sm">
                                VIP Exclusive Guide
                            </div>
                            <h1 className="serif-font text-3xl font-black mb-3 tracking-wider text-gold drop-shadow-sm">
                                峴港奢華自由行
                            </h1>
                            <p className="text-slate-600 text-sm font-medium flex items-center justify-center bg-white/70 backdrop-blur-md px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                                <i className="fa-solid fa-crown mr-2 text-amber-500"></i> 5天4夜 尊爵體驗
                            </p>
                        </div>
                    </div>

                    {/* Day Selector (Light Mode Pills) */}
                    <div className="sticky top-0 z-30 pt-5 pb-3 px-4 glass-light">
                        <div className="flex justify-between space-x-2 overflow-x-auto hide-scrollbar pb-1">
                            {itineraryData.map(day => (
                                <button 
                                    key={day.day}
                                    onClick={() => setActiveDay(day.day)}
                                    className={`relative flex-1 min-w-[70px] py-2.5 px-1 text-center rounded-2xl transition-all duration-300 ${activeDay === day.day ? 'bg-gradient-to-br from-amber-400 to-amber-500 text-white shadow-[0_5px_15px_rgba(245,158,11,0.25)] transform -translate-y-1' : 'bg-white text-slate-500 shadow-sm border border-slate-200 hover:bg-slate-50'}`}
                                >
                                    <div className="text-xs font-black">D{day.day}</div>
                                    <div className={`text-[10px] font-bold mt-0.5 ${activeDay === day.day ? 'opacity-90' : 'opacity-70'}`}>{day.date.split(' ')[0]}</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Itinerary Content */}
                    <div className="px-5 mt-6">
                        <div className="mb-8 bg-white border border-amber-100 shadow-[0_4px_20px_rgb(0,0,0,0.03)] rounded-2xl p-4 flex items-start space-x-3">
                            <i className="fa-solid fa-quote-left text-amber-300 text-2xl mt-0.5"></i>
                            <p className="text-slate-600 text-sm font-medium leading-relaxed pt-1">
                                {activeData.summary}
                            </p>
                        </div>

                        <div className="relative pb-4">
                            {/* Events */}
                            {activeData.events.map((event, idx) => (
                                <EventCard key={idx} event={event} onCopy={handleCopy} index={idx} />
                            ))}
                        </div>
                    </div>

                    {/* Floating Checklist Modal (Light Mode) */}
                    {showChecklist && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-5 bg-slate-900/40 backdrop-blur-sm transition-opacity">
                            <div className="bg-white rounded-[2rem] w-full max-w-sm p-7 relative shadow-[0_20px_50px_rgba(0,0,0,0.2)] animate-fadeUp border border-slate-100">
                                <button onClick={() => setShowChecklist(false)} className="absolute top-5 right-5 w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 flex items-center justify-center transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                <h2 className="serif-font text-2xl font-bold mb-6 text-slate-800 flex items-center">
                                    <i className="fa-solid fa-clipboard-list text-amber-500 mr-3"></i> 必備行前清單
                                </h2>
                                <ul className="space-y-4">
                                    {['護照 (進賭場必備實體)', '美金現鈔 ($50/$100 無劃記)', 'Grab App (確認已綁定信用卡)', '網路 eSIM (抵達即開通)', '防曬、雨傘、環保購物袋'].map((item, i) => (
                                        <li key={i} className="flex items-center group cursor-pointer">
                                            <div className="w-6 h-6 rounded-md border-2 border-slate-300 mr-3 flex items-center justify-center group-hover:border-amber-400 transition-colors bg-slate-50">
                                                <i className="fa-solid fa-check text-transparent group-active:text-amber-500"></i>
                                            </div>
                                            <span className="text-slate-600 font-medium">{item}</span>
                                        </li>
                                    ))}
                                </ul>
                                <div className="mt-8 p-4 bg-amber-50 border border-amber-200/60 rounded-2xl text-sm text-amber-800 leading-relaxed font-medium shadow-sm">
                                    <i className="fa-solid fa-bell mr-1.5 text-amber-500"></i> <strong className="text-amber-700">餐廳/按摩預約提醒：</strong><br/>
                                    • Bếp Cuốn (6/17)<br/>
                                    • Hương Tràm Spa (6/15)<br/>
                                    • SEN Boutique (6/17)
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bottom Fixed Action Bar (Light Mode) */}
                    <div className="fixed bottom-0 left-0 w-full glass-light px-5 py-4 pb-safe flex justify-center space-x-3 z-40 max-w-md mx-auto right-0 border-t border-slate-200/50">
                        <button 
                            onClick={() => handleCopy(HOTEL_NAME)}
                            className="flex-1 bg-white border border-slate-200 text-slate-700 font-bold py-3.5 rounded-2xl flex items-center justify-center shadow-[0_4px_15px_rgba(0,0,0,0.05)] hover:bg-slate-50 active:scale-[0.98] transition-all"
                        >
                            <i className="fa-solid fa-hotel text-amber-500 mr-2"></i> 
                            <span>複製飯店地址</span>
                        </button>
                        <button 
                            onClick={() => setShowChecklist(true)}
                            className="w-14 bg-gradient-to-br from-amber-400 to-amber-500 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center shadow-[0_4px_15px_rgba(245,158,11,0.3)] hover:opacity-90 active:scale-[0.98] transition-all"
                        >
                            <i className="fa-solid fa-list-check text-xl"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // Render the App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
